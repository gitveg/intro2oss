name: build

on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    - uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: pip3 install -r requirements.txt
      
    - name: Build docs
      run: |
        mkdocs -v build
        : > site/.nojekyll
        echo -n 'oss.hust.openatom.club' > site/CNAME
